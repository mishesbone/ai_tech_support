<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Technical Support Portal</title>
</head>
<body>
    <h1>Welcome to the AI Technical Support Portal</h1>
    <form id="support-form">
        <input type="text" id="query" placeholder="Ask your question..." required>
        <button type="submit">Ask</button>
    </form>
    <div id="response"></div>

    <script>
        document.getElementById('support-form').onsubmit = async (e) => {
            e.preventDefault();
            const query = document.getElementById('query').value;
            const responseDiv = document.getElementById('response');
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query })
            }).then(res => res.json());

            if (response.ticket_id) {
                responseDiv.innerHTML = `Ticket ID: ${response.ticket_id}<br>${response.response}`;
            } else {
                responseDiv.innerHTML = `Support Response: ${response.response}`;
            }
        };
    </script>
</body>
</html>
